name: ci

# PR gate for GitHub Flow (trello-agents). Home Assistant config is YAML +
# JSON; this checks both parse cleanly. Starting point — add
# `hass --script check_config` in a container later for a deeper check.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: YAML + JSON syntax check
        run: |
          python3 - <<'PY'
          import sys, glob, json, pathlib
          try:
              import yaml
          except ImportError:
              import subprocess; subprocess.run([sys.executable,"-m","pip","install","-q","pyyaml"],check=True); import yaml
          bad = 0
          # HA uses !include / !secret tags — treat unknown tags as opaque so YAML still parses.
          class HALoader(yaml.SafeLoader): pass
          HALoader.add_multi_constructor("!", lambda l,s,n: None)
          for f in glob.glob("**/*.yaml", recursive=True) + glob.glob("**/*.yml", recursive=True):
              if f.startswith(".github/"): continue
              try:
                  list(yaml.load_all(pathlib.Path(f).read_text(), Loader=HALoader))
              except Exception as e:
                  print(f"::error file={f}::{e}"); bad = 1
          for f in glob.glob("**/*.json", recursive=True):
              try:
                  json.loads(pathlib.Path(f).read_text())
              except Exception as e:
                  print(f"::error file={f}::{e}"); bad = 1
          sys.exit(bad)
PY
