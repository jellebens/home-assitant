type: vertical-stack
cards:
  - type: entities
    title: Buzzbrick Battery Economics
    show_header_toggle: false
    entities:
      - entity: sensor.apex300_battery_soc
        name: Battery state of charge
      - entity: sensor.current_electricity_market_price
        name: Current electricity price
      - entity: sensor.buzzbrick_charge_cost_today
        name: Charge cost today
      - entity: sensor.buzzbrick_discharge_savings_today
        name: Discharge savings today
      - entity: sensor.buzzbrick_net_savings_today
        name: Net savings today
      - entity: sensor.buzzbrick_charge_cost_this_month
        name: Charge cost this month
      - entity: sensor.buzzbrick_discharge_savings_this_month
        name: Discharge savings this month
      - entity: sensor.buzzbrick_net_savings_this_month
        name: Net savings this month

  - type: custom:apexcharts-card
    graph_span: 24h
    span:
      start: day
    header:
      show: true
      title: Cost vs Savings Rate
      show_states: true
      colorize_states: true
    now:
      show: true
      label: Now
    yaxis:
      - id: money
        decimals: 3
        min: 0
        apex_config:
          title:
            text: EUR/h
    apex_config:
      chart:
        height: 280
      legend:
        show: true
    series:
      - entity: sensor.buzzbrick_charge_cost_rate
        name: Charging cost
        yaxis_id: money
        type: area
        curve: smooth
        color: '#d97706'
        stroke_width: 2
        fill_raw: last
        group_by:
          duration: 15min
          func: avg
      - entity: sensor.buzzbrick_discharge_savings_rate
        name: Discharge savings
        yaxis_id: money
        type: area
        curve: smooth
        color: '#16a34a'
        stroke_width: 2
        fill_raw: last
        group_by:
          duration: 15min
          func: avg

  - type: custom:apexcharts-card
    graph_span: 24h
    span:
      start: day
    header:
      show: true
      title: Battery Power Flow
      show_states: true
      colorize_states: true
    now:
      show: true
      label: Now
    yaxis:
      - id: power
        decimals: 0
        min: 0
        apex_config:
          title:
            text: W
    apex_config:
      chart:
        height: 280
      legend:
        show: true
    series:
      - entity: sensor.buzzbrick_ap3002532000565690_grid_input_power
        name: Charge from grid
        yaxis_id: power
        type: line
        curve: smooth
        color: '#2563eb'
        stroke_width: 2
        group_by:
          duration: 10min
          func: avg
      - entity: sensor.buzzbrick_ap3002532000565690_alternating_current_out_power
        name: AC discharge
        yaxis_id: power
        type: line
        curve: smooth
        color: '#dc2626'
        stroke_width: 2
        group_by:
          duration: 10min
          func: avg

  - type: custom:apexcharts-card
    graph_span: 7d
    span:
      start: day
    stacked: false
    header:
      show: true
      title: Daily Battery Economics
      show_states: true
      colorize_states: true
    now:
      show: false
    yaxis:
      - id: daily_money
        decimals: 2
        apex_config:
          title:
            text: EUR/day
    apex_config:
      chart:
        height: 280
      legend:
        show: true
    series:
      - entity: sensor.buzzbrick_charge_cost_today
        name: Daily charge cost
        yaxis_id: daily_money
        type: column
        color: '#f59e0b'
        group_by:
          duration: 1d
          func: max
      - entity: sensor.buzzbrick_discharge_savings_today
        name: Daily discharge savings
        yaxis_id: daily_money
        type: column
        color: '#22c55e'
        group_by:
          duration: 1d
          func: max
      - entity: sensor.buzzbrick_net_savings_today
        name: Daily net savings
        yaxis_id: daily_money
        type: line
        curve: smooth
        color: '#7c3aed'
        stroke_width: 3
        group_by:
          duration: 1d
          func: last

  - type: gauge
    entity: sensor.buzzbrick_net_savings_today
    name: Net savings today
    min: -10
    max: 10
    severity:
      red: -10
      yellow: 0
      green: 2