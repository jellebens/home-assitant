apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zeus.fullname" . }}
  labels:
    {{- include "zeus.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Single long-running loop; never run two side by side (they would issue
  # conflicting commands to the battery).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "zeus.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the pod when the rendered config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "zeus.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: optimizer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "zeus.secretName" . }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: reports
              mountPath: /app/reports
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "zeus.fullname" . }}-config
        {{- if .Values.persistence.enabled }}
        - name: reports
          persistentVolumeClaim:
            claimName: {{ include "zeus.fullname" . }}-reports
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
